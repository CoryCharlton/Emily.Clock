<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emily.Clock &ndash; Alarm</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <h1>Emily.Clock</h1>
    <a class="back" href="/">&larr; Back</a>
    <section>
        <h2>Alarm</h2>
        <form id="form">
            <div class="check-row">
                <input type="checkbox" id="enabled" name="enabled">
                <label for="enabled">Enabled</label>
            </div>

            <label for="alarmTime">Alarm Time</label>
            <input type="time" id="alarmTime" name="alarmTime" required>

            <label for="maxDurationMinutes">Max Duration (minutes)</label>
            <input type="number" id="maxDurationMinutes" name="maxDurationMinutes" required min="1" max="30">

            <button type="submit">Save</button>
            <div id="status"></div>
        </form>
    </section>
    <script src="/js/app.js"></script>
    <script>
        (function () {
            var section = 'alarm';
            var statusEl = document.getElementById('status');

            App.loadConfig(section, function (data) {
                document.getElementById('enabled').checked = data.Enabled || false;
                document.getElementById('alarmTime').value = App.timeToInput(data.AlarmTime);
                document.getElementById('maxDurationMinutes').value = data.MaxDurationMinutes || '';
            });

            document.getElementById('form').addEventListener('submit', function (e) {
                e.preventDefault();
                App.saveConfig(section, {
                    Enabled: document.getElementById('enabled').checked,
                    AlarmTime: App.inputToTime(document.getElementById('alarmTime').value),
                    MaxDurationMinutes: parseInt(document.getElementById('maxDurationMinutes').value, 10)
                }, statusEl);
            });
        })();
    </script>
</body>
</html>
