<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emily.Clock &ndash; Date &amp; Time</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <h1>Emily.Clock</h1>
    <a class="back" href="/">&larr; Back</a>
    <section>
        <h2>Date &amp; Time</h2>
        <form id="form">
            <label for="wakeTime">Wake Time</label>
            <input type="time" id="wakeTime" name="wakeTime" required>

            <label for="bedTime">Bed Time</label>
            <input type="time" id="bedTime" name="bedTime" required>

            <label for="timeZone">Time Zone</label>
            <input type="text" id="timeZone" name="timeZone" required>
            <p class="hint"><a href="https://github.com/nayarsystems/posix_tz_db/blob/master/zones.csv">POSIX format, e.g. PST8PDT,M3.2.0/2:00:00,M11.1.0/2:00:00</a></p>

            <button type="submit">Save</button>
            <div id="status"></div>
        </form>
    </section>
    <script src="/js/app.js"></script>
    <script>
        (function () {
            var section = 'datetime';
            var statusEl = document.getElementById('status');

            App.loadConfig(section, function (data) {
                document.getElementById('wakeTime').value = App.timeToInput(data.WakeTime);
                document.getElementById('bedTime').value = App.timeToInput(data.BedTime);
                document.getElementById('timeZone').value = data.TimeZone || '';
            });

            document.getElementById('form').addEventListener('submit', function (e) {
                e.preventDefault();
                App.saveConfig(section, {
                    WakeTime: App.inputToTime(document.getElementById('wakeTime').value),
                    BedTime: App.inputToTime(document.getElementById('bedTime').value),
                    TimeZone: document.getElementById('timeZone').value
                }, statusEl);
            });
        })();
    </script>
</body>
</html>
