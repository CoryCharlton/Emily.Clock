<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emily.Clock &ndash; Wireless Access Point</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Urbanist:wght@600;700&display=swap">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <h1>Emily.Clock</h1>
    <a class="back" href="index.html">&larr; Back</a>
    <section>
        <h2>Wireless Access Point</h2>
        <form id="form">
            <label for="ssid">SSID</label>
            <input type="text" id="ssid" name="ssid" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password">

            <label for="ipAddress">IP Address</label>
            <input type="text" id="ipAddress" name="ipAddress" required>

            <label for="subnetMask">Subnet Mask</label>
            <input type="text" id="subnetMask" name="subnetMask" required>

            <button type="submit">Save</button>
        </form>
    </section>
    <div id="status"></div>
    <script src="/js/app.js"></script>
    <script>
        (function () {
            var section = 'wirelessaccesspoint';
            var statusEl = document.getElementById('status');

            App.loadConfig(section, function (data) {
                document.getElementById('ssid').value = data.Ssid || '';
                document.getElementById('password').value = data.Password || '';
                document.getElementById('ipAddress').value = data.IpAddress || '';
                document.getElementById('subnetMask').value = data.SubnetMask || '';
            });

            document.getElementById('form').addEventListener('submit', function (e) {
                e.preventDefault();
                App.saveConfig(section, {
                    Ssid: document.getElementById('ssid').value,
                    Password: document.getElementById('password').value,
                    IpAddress: document.getElementById('ipAddress').value,
                    SubnetMask: document.getElementById('subnetMask').value
                }, statusEl);
            });
        })();
    </script>
</body>
</html>
